<body>
    <table> 
        <h1>Zaokrąglenie narożników obszarów bloków np. DIV</h1>
        <textarea  rows="20" cols="70">
            Zaokrąglenie górnego-lewego 
            --
            narożnika:
            selektor { border-top-left-radius: zaokrąglenie }
            --
            Zaokrąglenie górnego-prawego 
            --
            narożnika:
            selektor { border-top-right-radius: zaokrąglenie }
            --
            Zaokrąglenie dolnego-prawego 
            --
            narożnika:
            selektor { border-bottom-right-radius: zaokrąglenie }
            --
            Zaokrąglenie dolnego-lewego 
            --
            narożnika:
            selektor { border-bottom-left-radius: zaokrąglenie }
            </textarea>
        




    </table>
    
</body>

<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stylowanie bloków</title>
    <style>
        
        .blok1 {
            background-color: #FFFDD0;
            width: 60%;
            height: 200px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .blok1 p {
            color: orange;
            font-size: 20pt;
            font-family: Arial, sans-serif;
        }

      
        .blok2 {
            background-color: magenta;
            width: 50%;
            height: 150px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .blok2 i {
            color: green;
            font-size: 20pt;
            font-weight: bold;
        }
        .blok2 strike {
            color: red;
            font-size: 20pt;
        }
        .blok2 u {
            color: purple;
            font-size: 20pt;
            text-decoration: overline;
        }

       
        .blok3 {
            background-color: #7FFF00;
            width: 70%;
            height: 250px;
            padding: 20px;
        }
        .blok3 h1 {
            color: blue;
            font-size: 30pt;
            text-decoration: underline;
        }
        .blok3 ol {
            font-size: 25pt;
            color: blue;
        }
        .blok3 ol ol {
            font-size: 20pt;
            color: red;
        }
        .blok3 ol ol ol {
            font-size: 15pt;
            color: gray;
        }
    </style>
</head>
<body>

    
    <div class="blok1">
        <p>Informatyka to dziedzina nauki zajmująca się przetwarzaniem informacji oraz tworzeniem oprogramowania.</p>
    </div>

    
    <div class="blok2">
        <p>
            <i>To jest kursywa</i>, 
            <strike>To jest przekreślenie</strike>, 
            <u>To jest podkreślenie</u>
        </p>
    </div>

   
    <div class="blok3">
        <h1>Nagłówek poziomu 1</h1>
<ol>
   li>Punkt pierwszy
<ol>
   <li>Punkt drugi
<ol>
   <li>Punkt trzeci</li>
</ol>
   </li>
</ol>
    </li>
</ol>
    </div>

</body>
</html>
